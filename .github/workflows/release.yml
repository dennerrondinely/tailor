name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to create GitHub releases and push version commits
      pull-requests: write  # to create the "Version Packages" PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so changesets can diff correctly
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          # Configures the npm registry and injects NODE_AUTH_TOKEN automatically
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test --no-coverage

      # -----------------------------------------------------------------------
      # Changesets action:
      #   - If there are pending changesets → opens / updates a "Version
      #     Packages" PR that bumps versions and updates CHANGELOG.md.
      #   - If the "Version Packages" PR is merged → publishes to npm.
      # -----------------------------------------------------------------------
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set in repo Settings → Secrets → Actions → NPM_TOKEN
          # Generate at https://www.npmjs.com/settings/<user>/tokens (Automation token)
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
